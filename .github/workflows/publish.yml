name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (default: latest release)"
        required: true
        type: string
        default: latest

permissions: {}

jobs:
  trigger:
    name: Trigger publish in bitwarden/deploy
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      deployments: write
      id-token: write
    steps:
      - name: Check branch
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "==================================================="
            echo "[!] Can only trigger publish from the 'main' branch"
            echo "==================================================="
            exit 1
          fi

      - name: Trigger publish in bitwarden/deploy
        uses: bitwarden/gh-actions/trigger-actions@main
        with:
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          task: publish-mcp-server
